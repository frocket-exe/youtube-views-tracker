name: Update YouTube Views

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */4 * * *" 
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib
          pip install pytz

      - name: Run script
        env:
          API_KEY: ${{ secrets.YT_API_KEY }}
          SEND_EMAIL: ${{ secrets.SEND_EMAIL }}
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          SEND_PW: ${{ secrets.SEND_PW }}
          RECEIVE_EMAIL: ${{ secrets.RECEIVE_EMAIL }}
        run: |
          python youtube_total_views.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add views.json
          git add milestones.json
          git add milestone_email.py
          git add yearStartViews.json
          VIEWS=$(python -c "import json; print(json.load(open('views.json'))['main']['total_views'])")
          git commit -m "Update views → $VIEWS" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
